<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नयाँ वर्ष २०८३ को विशेष सरप्राइज</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap');

        :root {
            --gold: #ffcc00;
            --accent: #ff3e3e;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- STAGE 1: THE PORTAL --- */
        #stage1 {
            text-align: center;
            z-index: 10;
        }

        .portal-btn {
            width: 120px;
            height: 120px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 50%;
            color: var(--gold);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            animation: pulse 2s infinite;
        }

        .portal-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 50px var(--gold);
        }

        /* --- STAGE 2: THE DATA STREAM --- */
        #stage2 {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
        }

        .stream-text {
            font-family: monospace;
            color: var(--gold);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .progress-container {
            width: 100%;
            height: 2px;
            background: #222;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- STAGE 3: THE CELEBRATION --- */
        #stage3 {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0505 0%, #050505 100%);
            overflow: hidden;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-text {
            font-size: 4rem;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            z-index: 5;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero-text.active {
            opacity: 1;
            transform: scale(1);
        }

        .nepali-wish {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #ddd;
            max-width: 80%;
            z-index: 5;
            line-height: 1.6;
        }

        .card-container {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            z-index: 5;
        }

        .wish-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 3px solid var(--gold);
            backdrop-filter: blur(10px);
            animation: slideUp 1s forwards;
            opacity: 0;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 204, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    
     <div id="stage1">
        <button class="portal-btn" onclick="nextStage()">खोल्नुहोस्</button>
        <p style="margin-top: 20px; color: #666; letter-spacing: 1px;">२०८३ को जादु...</p>
    </div>

    <div id="stage2">
        <div class="stream-text" id="status">प्रणाली सुरु गर्दै...</div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <div id="stage3">
        <canvas id="fireworks"></canvas>
        <h1 class="hero-text" id="mainTitle">HAPPY NEW YEAR <br> २०८३</h1>
        <div class="nepali-wish">
            तपाईंको जीवनमा सुख, शान्ति, र समृद्धिको नयाँ किरण छाओस्। 
            हरेक पाइलामा सफलता मिल्दै जाओस्!
        </div>
        
        <div class="card-container">
            <div class="wish-card" style="animation-delay: 0.5s;">सफलता</div>
            <div class="wish-card" style="animation-delay: 0.8s;">सुस्वास्थ्य</div>
            <div class="wish-card" style="animation-delay: 1.1s;">खुसी</div>
        </div>
    </div>

    <script>
        function nextStage() {
            document.getElementById('stage1').style.display = 'none';
            document.getElementById('stage2').style.display = 'flex';
            
            let width = 0;
            const bar = document.getElementById('bar');
            const status = document.getElementById('status');
            const logs = [
                "नयाँ अवसरहरू खोज्दै...",
                "खुसीका पलहरू जम्मा गर्दै...",
                "२०८३ को संकल्प तयार पार्दै...",
                "लगभग तयार छ!"
            ];

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    showFinal();
                } else {
                    width++;
                    bar.style.width = width + '%';
                    if(width % 25 === 0) status.innerText = logs[Math.floor(width/26)];
                }
            }, 30);
        }

        function showFinal() {
            document.getElementById('stage2').style.display = 'none';
            document.getElementById('stage3').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('mainTitle').classList.add('active');
            }, 100);
            startFireworks();
        }

        // Particle System for Fireworks
        function startFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#ffcc00', '#ff3e3e', '#ffffff', '#00ffcc'];

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 100;
                    this.speed = Math.random() * 3 + 2;
                    this.radius = Math.random() * 2;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.opacity = Math.random();
                }
                update() {
                    this.y -= this.speed;
                    if (this.y < -10) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 150; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
